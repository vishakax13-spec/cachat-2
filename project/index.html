<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>CaChat</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<style>
:root{
  --bg:#050505;--bg2:#0e0e0e;--bg3:#161616;--bg4:#1f1f1f;
  --bd:#1f1f1f;--bd2:#2a2a2a;
  --tx:#f7f7f7;--tx2:#a0a0a0;--tx3:#5a5a5a;
  --ac:#0095f6;--rd:#ed4956;--gn:#23d160;
  --gr:linear-gradient(135deg,#f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%);
  --gls:rgba(255,255,255,0.04);--glb:rgba(255,255,255,0.08);
  --sh:0 8px 32px rgba(0,0,0,0.6);
  --sh2:0 2px 12px rgba(0,0,0,0.4);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;font-size:14px;overflow:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
::-webkit-scrollbar{width:0;height:0}
button,input,textarea,select{font-family:inherit;outline:none;border:none;background:none}
img,video{display:block}

/* VERIFIED BADGE */
.vb{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;background:var(--ac);border-radius:50%;flex-shrink:0;margin-left:3px}
.vb::after{content:'\2713';color:#fff;font-size:9px;font-weight:900}
.vb.lg{width:20px;height:20px}.vb.lg::after{font-size:11px}
.vb.sm{width:13px;height:13px}.vb.sm::after{font-size:7px}

/* AVATAR */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden;user-select:none;position:relative}
.av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.od{position:absolute;bottom:0;right:0;width:11px;height:11px;background:var(--gn);border-radius:50%;border:2.5px solid var(--bg);box-shadow:0 0 0 1px var(--gn)40}

/* APP LOCK */
#app-lock{position:fixed;inset:0;background:var(--bg);z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:30px}
.ll{font-size:46px;font-weight:800;background:var(--gr);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-style:italic;letter-spacing:-2px}
.linp{width:100%;max-width:280px;background:var(--bg3);border:1.5px solid var(--bd2);border-radius:14px;padding:15px 18px;color:var(--tx);font-size:20px;text-align:center;letter-spacing:6px;transition:border-color .2s}
.linp:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(0,149,246,.15)}
.lbtn{width:100%;max-width:280px;background:var(--ac);color:#fff;font-size:15px;font-weight:700;padding:14px;cursor:pointer;border-radius:14px;border:none;transition:opacity .15s,transform .1s;letter-spacing:.3px}
.lbtn:active{opacity:.85;transform:scale(.98)}
.lerr{font-size:12px;color:var(--rd);min-height:18px;text-align:center;font-weight:500}

/* AUTH */
#auth{position:fixed;inset:0;background:var(--bg);z-index:998;display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.aw{width:100%;max-width:360px}
.alo{font-size:52px;font-weight:900;text-align:center;margin-bottom:32px;background:var(--gr);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-3px;font-style:italic}
.ac2{background:var(--bg2);border:1px solid var(--bd2);border-radius:4px;padding:28px 24px;margin-bottom:10px;box-shadow:var(--sh2)}
.aif{width:100%;background:var(--bg3);border:1px solid var(--bd2);border-radius:4px;padding:13px 14px;color:var(--tx);font-size:13px;margin-bottom:8px;transition:border-color .2s,background .2s}
.aif::placeholder{color:var(--tx3)}.aif:focus{border-color:var(--tx2);background:var(--bg4)}
.abtn{width:100%;background:var(--ac);color:#fff;font-size:14px;font-weight:700;padding:11px;cursor:pointer;border-radius:8px;margin-top:6px;border:none;transition:opacity .15s;letter-spacing:.3px}
.abtn:disabled{opacity:.4;cursor:not-allowed}.abtn:not(:disabled):active{opacity:.85}
.adv{display:flex;align-items:center;gap:14px;margin:16px 0}
.adv::before,.adv::after{content:'';flex:1;height:1px;background:var(--bd2)}
.adv span{font-size:11px;color:var(--tx3);font-weight:700;letter-spacing:1.5px}
.abot{background:var(--bg2);border:1px solid var(--bd2);border-radius:4px;padding:18px;text-align:center;font-size:13px;color:var(--tx2)}
.abot a{color:var(--ac);font-weight:600;cursor:pointer}
.aerr{color:var(--rd);font-size:12px;text-align:center;margin-bottom:8px;display:none;font-weight:500;background:#ed495612;padding:8px;border-radius:6px;border:1px solid #ed495625}
.aok2{color:var(--gn);font-size:12px;text-align:center;margin-bottom:8px;display:none;background:#23d16012;padding:8px;border-radius:6px}
.alink{background:none;color:var(--ac);font-size:13px;cursor:pointer;text-align:center;width:100%;padding:10px 0;border:none;font-weight:500}

/* APP LAYOUT */
#app{display:none;height:100dvh;flex-direction:row}

/* LEFT NAV */
.lnav{width:72px;border-right:1px solid var(--bd);display:none;flex-direction:column;align-items:center;padding:8px 0 16px;background:var(--bg);flex-shrink:0}
@media(min-width:769px){.lnav{display:flex}}
@media(min-width:1100px){.lnav{width:244px;align-items:flex-start;padding:8px 16px 16px}}
.nlo{font-size:26px;font-weight:900;padding:18px 0 24px;background:var(--gr);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-style:italic;text-align:center;width:100%;letter-spacing:-1px}
@media(min-width:1100px){.nlo{text-align:left}}
.ni{width:52px;height:52px;display:flex;align-items:center;justify-content:center;border-radius:14px;cursor:pointer;transition:background .15s;position:relative;margin-bottom:2px}
@media(min-width:1100px){.ni{width:100%;padding:0 14px;justify-content:flex-start;gap:14px;height:52px}}
.ni:hover{background:var(--gls)}.ni.on{background:var(--bg3)}
.ni.on svg{stroke-width:2.5}
.ni svg{width:26px;height:26px;flex-shrink:0;stroke:var(--tx);transition:stroke .15s}
.nilbl{font-size:15px;display:none;font-weight:500}
@media(min-width:1100px){.nilbl{display:block}}
.nib{position:absolute;top:8px;left:30px;min-width:18px;height:18px;background:var(--rd);border-radius:99px;font-size:10px;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid var(--bg)}
@media(min-width:1100px){.nib{left:auto;right:8px;top:50%;transform:translateY(-50%);border:none}}
.lbot{margin-top:auto;width:100%}
.lpr{display:flex;align-items:center;gap:12px;padding:10px;border-radius:14px;cursor:pointer;justify-content:center;transition:background .15s}
@media(min-width:1100px){.lpr{justify-content:flex-start}}
.lpr:hover{background:var(--gls)}
.lpn{font-size:14px;font-weight:600;display:none}
@media(min-width:1100px){.lpn{display:block}}

/* BOTTOM NAV */
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;height:52px;background:rgba(5,5,5,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--bd);z-index:100;align-items:center;justify-content:space-around}
@media(max-width:768px){.bnav{display:flex}}
.bni{flex:1;height:100%;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:opacity .15s}
.bni:active{opacity:.6}
.bni svg{width:25px;height:25px;stroke:var(--tx2);transition:stroke .15s}
.bni.on svg{stroke:var(--tx)}

/* CONTENT */
.content{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0}
.page{display:none;height:100%;flex-direction:column;overflow:hidden}
.page.on{display:flex}
@media(max-width:768px){.page.on{padding-bottom:52px}}

/* HOME HEADER */
.hhd{padding:12px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:rgba(5,5,5,0.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.hlo{font-size:24px;font-weight:900;background:var(--gr);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-style:italic;letter-spacing:-1px}
.hscr{flex:1;overflow-y:auto}

/* NOTES BAR */
.nbar{padding:10px 0 10px 14px;border-bottom:1px solid var(--bd);overflow-x:auto;display:flex;gap:6px;align-items:flex-start;min-height:112px;flex-shrink:0;scrollbar-width:none}
.nbar::-webkit-scrollbar{display:none}
.nitm{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;flex-shrink:0;width:74px}
.nring{width:64px;height:64px;border-radius:50%;padding:2.5px;background:var(--gr);position:relative}
.nring.mine{background:var(--bg4);border:2px dashed var(--bd2)}
.nrinn{width:100%;height:100%;border-radius:50%;background:var(--bg);padding:2.5px}
.nav2{width:100%;height:100%;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;overflow:hidden;color:#fff;background:var(--bg3)}
.nav2 img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.nbub{background:var(--bg3);border:1px solid var(--bd2);border-radius:12px;padding:3px 8px;font-size:10px;white-space:nowrap;max-width:70px;overflow:hidden;text-overflow:ellipsis;text-align:center;color:var(--tx2)}
.nnm{font-size:11px;color:var(--tx3);text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%;font-weight:500}

/* ONLINE FRIENDS BAR */
.ofbar{padding:8px 14px;border-bottom:1px solid var(--bd);overflow-x:auto;display:flex;gap:14px;align-items:center;min-height:62px;flex-shrink:0;scrollbar-width:none}
.ofbar::-webkit-scrollbar{display:none}
.ofitm{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;flex-shrink:0}
.ofav{position:relative;width:42px;height:42px}
.ofnm{font-size:10px;color:var(--tx3);max-width:46px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;font-weight:500}

/* SUGGESTIONS */
.sug-sec{padding:12px 14px;border-bottom:1px solid var(--bd)}
.sug-ttl{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;color:var(--tx)}
.sug-list{overflow-x:auto;display:flex;gap:10px;padding-bottom:4px;scrollbar-width:none}
.sug-list::-webkit-scrollbar{display:none}
.sug-card{background:var(--bg2);border:1px solid var(--bd2);border-radius:16px;padding:16px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;flex-shrink:0;width:130px;transition:border-color .2s}
.sug-card:hover{border-color:var(--bd2)80}
.sug-name{font-size:13px;font-weight:600;text-align:center;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;width:100%;color:var(--tx)}
.sug-fbtn{background:var(--ac);color:#fff;font-size:12px;font-weight:700;padding:6px 0;cursor:pointer;border-radius:10px;width:100%;border:none;transition:opacity .15s;letter-spacing:.2px}
.sug-fbtn:active{opacity:.8}
.sug-fbtn.fol{background:var(--bg3);color:var(--tx2);border:1px solid var(--bd2)}

/* TOP GROUPS */
.tg-sec{padding:12px 14px;border-bottom:1px solid var(--bd)}
.tg-list{overflow-x:auto;display:flex;gap:10px;padding-bottom:4px;scrollbar-width:none}
.tg-list::-webkit-scrollbar{display:none}
.tg-card{background:var(--bg2);border:1px solid var(--bd2);border-radius:14px;padding:12px;display:flex;align-items:center;gap:10px;flex-shrink:0;min-width:210px;cursor:pointer;transition:border-color .2s}

/* FEED */
.pc{border-bottom:1px solid var(--bd)}
.pchd{display:flex;align-items:center;gap:10px;padding:11px 14px}
.pcun{font-size:14px;font-weight:700;display:flex;align-items:center;cursor:pointer;letter-spacing:-.1px}
.pct{font-size:12px;color:var(--tx3);font-weight:400}
.pswiper{position:relative;overflow:hidden;width:100%;aspect-ratio:1;background:#000}
.psinner{display:flex;height:100%;transition:transform .3s cubic-bezier(.25,.46,.45,.94)}
.psslide{flex:0 0 100%;height:100%;overflow:hidden;position:relative}
.psslide img,.psslide video{width:100%;height:100%;object-fit:cover}
.psdots{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:5px}
.psdot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.5);transition:all .25s;cursor:pointer}
.psdot.on{background:#fff;width:18px;border-radius:3px}
.pscnt{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.65);backdrop-filter:blur(8px);border-radius:99px;padding:4px 10px;font-size:12px;font-weight:700;color:#fff;letter-spacing:.3px}
.pvol{position:absolute;bottom:12px;right:12px;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.65);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;border:none;color:#fff;transition:transform .15s}
.pvol:active{transform:scale(.9)}
.pcacts{display:flex;align-items:center;gap:4px;padding:8px 10px 2px}
.pcab{background:none;color:var(--tx);cursor:pointer;display:flex;align-items:center;gap:5px;font-size:13px;padding:6px;border:none;border-radius:50%;transition:background .15s}
.pcab:active{background:var(--gls)}
.pcab.lkd svg{fill:var(--rd);stroke:var(--rd)}
.pclk{font-size:14px;font-weight:700;padding:2px 14px 4px;letter-spacing:-.1px}
.pccap{padding:2px 14px 12px;font-size:14px;line-height:1.45;color:var(--tx)}
.pccap strong{font-weight:700;margin-right:5px;cursor:pointer}
.pmus{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--bg2);margin:4px 14px;border-radius:12px;border:1px solid var(--bd2)}
.pmb{width:34px;height:34px;border-radius:50%;background:var(--ac);color:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:none;transition:transform .1s}
.pmb:active{transform:scale(.9)}
.pmin{flex:1;min-width:0}
.pmn{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pmpb{height:3px;background:var(--bg4);border-radius:99px;margin-top:5px;overflow:hidden}
.pmpr{height:100%;background:var(--ac);border-radius:99px;transition:width .25s;width:0%}
.pmt{font-size:10px;color:var(--tx3);flex-shrink:0;font-weight:600;letter-spacing:.3px}

/* SEARCH */
.shd{padding:10px 14px;border-bottom:1px solid var(--bd);flex-shrink:0;background:rgba(5,5,5,0.9);backdrop-filter:blur(12px)}
.sbox{background:var(--bg3);border-radius:12px;display:flex;align-items:center;gap:10px;padding:0 14px;border:1px solid var(--bd2);transition:border-color .2s}
.sbox:focus-within{border-color:var(--tx3)}
.sinp{flex:1;background:none;color:var(--tx);font-size:15px;padding:11px 0;border:none}
.sinp::placeholder{color:var(--tx3)}
.sres{flex:1;overflow-y:auto}
.sui{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer;transition:background .15s}
.sui:hover,.sui:active{background:var(--gls)}

/* DMs PANEL */
#page-dm{flex-direction:row}
.dms{width:360px;border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0}
@media(max-width:900px){.dms{width:300px}}
@media(max-width:768px){.dms{width:100%}}
.dmhd{padding:16px 16px 10px;border-bottom:1px solid var(--bd);flex-shrink:0;background:rgba(5,5,5,0.9);backdrop-filter:blur(12px)}
.dmtit{font-size:17px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;letter-spacing:-.3px}
.dmsw{background:var(--bg3);border-radius:12px;display:flex;align-items:center;gap:10px;padding:0 14px;border:1px solid var(--bd2);transition:border-color .2s}
.dmsw:focus-within{border-color:var(--tx3)}
.dmsi{flex:1;background:none;color:var(--tx);font-size:14px;padding:10px 0;border:none}
.dmsi::placeholder{color:var(--tx3)}
.dtabs{display:flex;border-bottom:1px solid var(--bd);flex-shrink:0}
.dtab{flex:1;padding:11px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;color:var(--tx3);border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.1px}
.dtab.on{color:var(--tx);border-bottom-color:var(--tx)}
.dlist{flex:1;overflow-y:auto}
.dmi{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;position:relative;transition:background .1s}
.dmi:hover,.dmi.on{background:var(--gls)}
.dmii{flex:1;min-width:0}
.dmin{font-size:14px;font-weight:700;display:flex;align-items:center;gap:3px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;letter-spacing:-.1px}
.dmip{font-size:13px;color:var(--tx3);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;margin-top:2px}
.dmit{font-size:11px;color:var(--tx3);flex-shrink:0;font-weight:500}
.dmi3{width:30px;height:30px;background:none;color:var(--tx3);cursor:pointer;border-radius:50%;display:none;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;border:none;transition:background .15s}
.dmi3:hover{background:var(--bg3)}
.dmi:hover .dmi3{display:flex}.dmi:hover .dmit{display:none}

/* CHAT PANE */
.cpane{flex:1;display:flex;flex-direction:column;height:100%;overflow:hidden;min-width:0}
.cempty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--tx3);text-align:center;padding:20px}
.cempty h3{font-size:22px;font-weight:700;color:var(--tx2)}
.chd{height:62px;border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 10px 0 14px;gap:10px;flex-shrink:0;background:rgba(5,5,5,0.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.chin{flex:1;cursor:pointer;min-width:0}
.chnm{font-size:15px;font-weight:700;display:flex;align-items:center;gap:4px;letter-spacing:-.2px}
.chst{font-size:12px;color:var(--tx3);margin-top:2px;font-weight:400}

/* MESSAGES */
.msgs{flex:1;min-height:0;overflow-y:auto;padding:10px 14px 8px;display:flex;flex-direction:column;gap:2px}
.mrow{display:flex;align-items:flex-end;gap:8px;margin-bottom:2px}
.mrow.mine{flex-direction:row-reverse}
.mwrap{display:flex;flex-direction:column;max-width:68%}
.mine .mwrap{align-items:flex-end}.theirs .mwrap{align-items:flex-start}
.bub{padding:10px 14px;border-radius:22px;font-size:14px;line-height:1.5;word-break:break-word;position:relative}
.mine .bub{background:var(--ac);color:#fff;border-bottom-right-radius:5px}
.theirs .bub{background:var(--bg3);color:var(--tx);border-bottom-left-radius:5px;border:1px solid var(--bd2)}
.bub.uns{opacity:.35;font-style:italic;font-size:13px}
.etag{font-size:10px;opacity:.45;margin-left:4px}
.mtm{font-size:10px;color:var(--tx3);padding:0 4px;margin-top:3px;font-weight:400}
.stk{font-size:10px;color:rgba(255,255,255,.6);margin-left:3px}
.stk.s{color:rgba(255,255,255,.35)}
.rchip{background:var(--bg3);border:1.5px solid var(--bd);border-radius:99px;padding:2px 8px;font-size:15px;cursor:pointer;display:inline-flex;align-items:center;gap:3px;margin-top:3px;transition:transform .1s}
.rchip:active{transform:scale(.9)}
.rchip.me{background:rgba(0,149,246,.12);border-color:rgba(0,149,246,.35)}
.rpick{position:absolute;background:var(--bg3);border:1px solid var(--bd2);border-radius:30px;padding:8px 14px;display:none;gap:8px;z-index:50;box-shadow:0 8px 32px rgba(0,0,0,.8);bottom:calc(100% + 8px)}
.mine .rpick{right:0}.theirs .rpick{left:0}
.rbtn{font-size:22px;cursor:pointer;line-height:1;transition:transform .15s}
.rbtn:hover{transform:scale(1.3)}
.ddiv{text-align:center;font-size:11px;color:var(--tx3);margin:10px 0;display:flex;align-items:center;gap:10px;font-weight:500;letter-spacing:.3px}
.ddiv::before,.ddiv::after{content:'';flex:1;height:1px;background:var(--bd)}
.rprev{background:rgba(255,255,255,.08);border-left:3px solid rgba(255,255,255,.35);padding:6px 10px;border-radius:8px;margin-bottom:6px;font-size:12px;opacity:.9;cursor:pointer}
.theirs .rprev{background:var(--bg4);border-left-color:var(--tx3)}
.macts{display:none;gap:4px;margin-top:5px;flex-wrap:wrap}
.mwrap:hover .macts{display:flex}
.mact{padding:4px 10px;border:1px solid var(--bd2);border-radius:20px;font-size:11px;background:var(--bg3);color:var(--tx2);cursor:pointer;transition:background .15s;font-weight:500}
.mact:hover{background:var(--bg4)}.mact.rd{color:var(--rd)}

<script>

var API='',token=localStorage.getItem('cc3_t'),me=null;
try{me=JSON.parse(localStorage.getItem('cc3_me')||'null');}catch(e){me=null;}
var socket,activePeerId=null,activePeer=null,activeGroupId=null;
var allMsgs=[],allConvos=[],allGroups=[],allNotifs=[],allPosts=[];
var editId=null,replyId=null,ctxPeerId=null;
var privUnlocked=false,privTI=null,typT=null;
var onlineSet=new Set(),curTheme='default',dmTab='dms';
var _noteCache={},_postAudios={},_nvAudio=null,_myNoteAudio=null,_muteState={};
var _pf=null,_pmf=null,_pms=0,_pme=null,_pmd=0,_pta=null,_pti=null;
var _nmf=null,_nms=0,_nme=null,_nmd=0,_nta=null,_nti=null;
var _selTheme=null,_toastT=null;
var THEMES={
  'default':{n:'Default',b:'var(--ac)'},
  'love':{n:'Love',b:'linear-gradient(135deg,#f093fb,#f5576c)'},
  'ocean':{n:'Ocean',b:'linear-gradient(135deg,#667eea,#764ba2)'},
  'fire':{n:'Fire',b:'linear-gradient(135deg,#f7971e,#ffd200)'},
  'mint':{n:'Mint',b:'linear-gradient(135deg,#11998e,#38ef7d)'},
  'dark':{n:'Dark',b:'#2a2a2a'},
  'rose':{n:'Rose',b:'linear-gradient(135deg,#ff9a9e,#fecfef)'},
  'neon':{n:'Neon',b:'linear-gradient(135deg,#00f2fe,#4facfe)'}
};

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escQ(s){return String(s||'').replace(/"/g,'&quot;');}
function escA(s){return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' ');}
function fv(id){var e=document.getElementById(id);return e?e.value.trim():'';}
function fmtTime(ts){
  if(!ts)return'';
  var d=new Date(ts*1000),now=new Date(),diff=Math.floor((now-d)/86400000);
  if(diff===0)return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  if(diff===1)return'Yesterday';
  if(diff<7)return d.toLocaleDateString([],{weekday:'short'});
  return d.toLocaleDateString([],{month:'short',day:'numeric'});
}
function fmtDate(ts){
  var d=new Date(ts*1000),now=new Date(),diff=Math.floor((now-d)/86400000);
  if(diff===0)return'Today';if(diff===1)return'Yesterday';
  return d.toLocaleDateString([],{month:'long',day:'numeric'});
}
function timeAgo(ts){
  if(!ts)return'';var d=Math.floor(Date.now()/1000)-ts;
  if(d<60)return'just now';if(d<3600)return Math.floor(d/60)+'m';
  if(d<86400)return Math.floor(d/3600)+'h';return Math.floor(d/86400)+'d';
}
function lastSeen(ts){
  if(!ts)return'Offline';var d=Math.floor(Date.now()/1000)-ts;
  if(d<120)return'Active now';if(d<3600)return'Active '+Math.floor(d/60)+'m ago';
  if(d<86400)return'Active '+Math.floor(d/3600)+'h ago';return'Active '+Math.floor(d/86400)+'d ago';
}
function fmtSec(s){
  if(!s||s<0)return'0:00';
  var m=Math.floor(s/60),sc=Math.floor(s%60);return m+':'+(sc<10?'0':'')+sc;
}
function toast(msg,type){
  var el=document.getElementById('toast');el.textContent=msg;
  if(type==='red'){el.style.background='#ed495620';el.style.color='var(--rd)';el.style.borderColor='#ed495640';}
  else if(type==='green'){el.style.background='#1db95420';el.style.color='var(--gn)';el.style.borderColor='#1db95440';}
  else{el.style.background='var(--bg4)';el.style.color='var(--tx)';el.style.borderColor='var(--bd2)';}
  el.classList.add('on');clearTimeout(_toastT);
  _toastT=setTimeout(function(){el.classList.remove('on');},3200);
}
function api(path,method,body){
  method=method||'GET';
  var opts={method:method,headers:{'Content-Type':'application/json'}};
  if(token)opts.headers['Authorization']='Bearer '+token;
  if(body)opts.body=JSON.stringify(body);
  return fetch(API+path,opts).then(function(r){
    return r.text().then(function(t){
      var d;try{d=JSON.parse(t);}catch(e){throw new Error('Server error');}
      if(!r.ok)throw new Error(d.error||'Request failed');return d;
    });
  });
}
function avHtml(u,sz){
  var bg=u.avatar_color||'#833AB4';
  var ltr=((u.name||u.username||'?')[0]).toUpperCase();
  var inner=u.avatar?('<img src="'+u.avatar+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%" onerror="this.remove()">'):esc(ltr);
  return '<div class="av" style="width:'+sz+'px;height:'+sz+'px;font-size:'+Math.floor(sz*.38)+'px;background:'+bg+'">'+inner+'</div>';
}
function setAv(el,u,sz){
  if(!el||!u)return;
  el.style.background=u.avatar_color||'#833AB4';
  el.style.width=sz+'px';el.style.height=sz+'px';
  el.style.fontSize=Math.floor(sz*.38)+'px';el.style.borderRadius='50%';
  if(u.avatar)el.innerHTML='<img src="'+u.avatar+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%" onerror="this.remove()">';
  else el.textContent=((u.name||u.username||'?')[0]).toUpperCase();
}

// APP LOCK
function shouldLock(){
  if(!me||!me.has_app_password)return false;
  var lu=parseInt(localStorage.getItem('cc_ul')||'0');
  return(Math.floor(Date.now()/1000)-lu)>60;
}
function showLock(){
  document.getElementById('app-lock').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('auth').style.display='none';
  document.getElementById('linp').value='';
  document.getElementById('lerr').textContent='';
  setTimeout(function(){document.getElementById('linp').focus();},100);
}
function verifyLock(){
  var pw=document.getElementById('linp').value;if(!pw)return;
  api('/api/app-password/verify','POST',{password:pw}).then(function(){
    localStorage.setItem('cc_ul',Math.floor(Date.now()/1000));
    document.getElementById('app-lock').style.display='none';
    document.getElementById('app').style.display='flex';
  }).catch(function(e){
    document.getElementById('lerr').textContent=e.message;
    document.getElementById('linp').value='';
    if(e.message.toLowerCase().indexOf('logout')>=0)setTimeout(doLogout,1500);
  });
}
document.getElementById('linp').addEventListener('keydown',function(e){if(e.key==='Enter')verifyLock();});
document.addEventListener('visibilitychange',function(){
  if(document.hidden&&me&&me.has_app_password)localStorage.setItem('cc_ul','0');
  else if(!document.hidden&&token&&me&&me.has_app_password&&shouldLock())showLock();
});

// AUTH
function buildAuth(mode){
  document.getElementById('auth').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('app-lock').style.display='none';
  var w=document.getElementById('auth-inner');
  if(mode==='reg'){
    w.innerHTML='<div class="ac2"><div class="aerr" id="ae"></div><div class="aok2" id="ao"></div>'+
      '<input class="aif" id="rn" placeholder="Full Name (optional)"/>'+
      '<input class="aif" id="ru" placeholder="Username" autocomplete="off"/>'+
      '<input class="aif" type="password" id="rp" placeholder="Password (min 6 chars)"/>'+
      '<input class="aif" type="tel" id="rph" placeholder="Phone (for recovery)"/>'+
      '<input class="aif" type="email" id="rg" placeholder="Email (for recovery)"/>'+
      '<button class="abtn" onclick="doReg()">Sign Up</button>'+
      '<div class="adv"><span>OR</span></div></div>'+
      '<div class="abot">Have an account? <a onclick="buildAuth(\'login\')">Log in</a></div>';
  }else if(mode==='forgot'){
    w.innerHTML='<div class="ac2"><div class="aerr" id="ae"></div><div class="aok2" id="ao"></div>'+
      '<p style="font-size:15px;font-weight:600;text-align:center;margin-bottom:12px">Find Account</p>'+
      '<input class="aif" id="fc" placeholder="Phone or email"/>'+
      '<button class="abtn" onclick="doForgot()">Find Account</button>'+
      '<button class="alink" onclick="buildAuth(\'login\')">Back to login</button></div>';
  }else{
    w.innerHTML='<div class="ac2"><div class="aerr" id="ae"></div>'+
      '<input class="aif" id="lu" placeholder="Username" autocomplete="off"/>'+
      '<input class="aif" type="password" id="lp" placeholder="Password"/>'+
      '<button class="abtn" onclick="doLogin()">Log In</button>'+
      '<div class="adv"><span>OR</span></div>'+
      '<button class="alink" onclick="buildAuth(\'forgot\')">Forgot password?</button></div>'+
      '<div class="abot">No account? <a onclick="buildAuth(\'reg\')">Sign up</a></div>';
  }
}
function shAerr(m){var e=document.getElementById('ae');if(e){e.textContent=m;e.style.display='block';}}
function shAok(m){var e=document.getElementById('ao');if(e){e.textContent=m;e.style.display='block';}}
function setBtnD(d){var b=document.querySelector('.abtn');if(b)b.disabled=d;}
function doReg(){
  var n=fv('rn'),u=fv('ru'),p=fv('rp'),ph=fv('rph'),g=fv('rg');
  if(!u||!p)return shAerr('Username and password required');
  if(p.length<6)return shAerr('Password min 6 chars');
  setBtnD(true);
  api('/api/register','POST',{username:u,password:p,name:n,phone:ph,gmail:g})
    .then(function(){shAok('Account created! Log in.');setTimeout(function(){buildAuth('login');},1400);})
    .catch(function(e){shAerr(e.message);}).finally(function(){setBtnD(false);});
}
function doLogin(){
  var u=fv('lu'),p=fv('lp');if(!u||!p)return shAerr('Fill all fields');
  setBtnD(true);
  api('/api/login','POST',{username:u,password:p}).then(function(r){
    token=r.token;me=r.user;
    localStorage.setItem('cc3_t',token);localStorage.setItem('cc3_me',JSON.stringify(me));
    if(me.has_app_password){document.getElementById('auth').style.display='none';showLock();}else startApp();
  }).catch(function(e){shAerr(e.message);}).finally(function(){setBtnD(false);});
}
function doForgot(){
  var c=fv('fc');if(!c)return shAerr('Enter phone or email');
  setBtnD(true);
  api('/api/forgot-password','POST',{contact:c})
    .then(function(r){shAok(r.message);})
    .catch(function(e){shAerr(e.message);}).finally(function(){setBtnD(false);});
}
function doLogout(){
  token=null;me=null;activePeerId=null;activeGroupId=null;
  localStorage.removeItem('cc3_t');localStorage.removeItem('cc3_me');localStorage.removeItem('cc_ul');

// SOCKET
function initSocket(){
  socket=io();socket.emit('user_online',me.id);
  socket.on('new_message',function(msg){
    var pid=msg.sender_id===me.id?msg.receiver_id:msg.sender_id;
    if(!activeGroupId&&parseInt(pid)===parseInt(activePeerId)){
      allMsgs.push(msg);appendMsg(msg,false);scrollBtm();
      api('/api/messages/seen/'+pid,'POST').catch(function(){});
    }
    loadConvos();
    if(parseInt(pid)!==parseInt(activePeerId)||activeGroupId)
      toast((msg.sender_display||msg.sender_name)+': '+(msg.msg_type==='photo'?'[photo]':msg.content.slice(0,30)));
  });
  socket.on('new_group_message',function(msg){
    if(activeGroupId&&parseInt(msg.group_id)===parseInt(activeGroupId)){
      allMsgs.push(msg);appendMsg(msg,true);scrollBtm();
    }
    loadGroups();
  });
  socket.on('message_updated',function(d){
    var i=allMsgs.findIndex(function(m){return m.id===d.id;});
    if(i>=0){allMsgs[i]=Object.assign({},allMsgs[i],d);renderMsgs(!!activeGroupId);}
    loadConvos();
  });
  socket.on('message_deleted',function(d){
    allMsgs=allMsgs.filter(function(m){return m.id!==d.id;});
    renderMsgs(!!activeGroupId);loadConvos();
  });
  socket.on('message_reaction',function(d){
    var i=allMsgs.findIndex(function(m){return m.id===d.id;});
    if(i>=0){allMsgs[i].reaction=d.reaction;renderMsgs(!!activeGroupId);}
  });
  socket.on('messages_seen',function(d){
    allMsgs.forEach(function(m){if(m.sender_id===me.id&&m.receiver_id===parseInt(d.peerId))m.is_seen=1;});
    renderMsgs(false);
  });
  socket.on('group_message_deleted',function(d){
    allMsgs=allMsgs.filter(function(m){return m.id!==d.id;});renderMsgs(true);
  });
  socket.on('group_banned',function(d){
    if(activeGroupId===d.group_id){backChat();loadGroups();}
    toast('Banned from group','red');
  });
  socket.on('online_status',function(d){
    if(d.online)onlineSet.add(parseInt(d.userId));else onlineSet.delete(parseInt(d.userId));
    if(!activeGroupId&&parseInt(d.userId)===parseInt(activePeerId))updChatSt();
    renderConvos();
  });
  socket.on('typing',function(d){
    if(!activeGroupId&&parseInt(d.sender_id)===parseInt(activePeerId))
      document.getElementById('tyrow').style.display=d.typing?'flex':'none';
  });
  socket.on('group_typing',function(d){
    if(activeGroupId&&parseInt(d.group_id)===parseInt(activeGroupId))
      document.getElementById('tyrow').style.display=d.typing?'flex':'none';
  });
  socket.on('new_notification',function(n){
    allNotifs.unshift({id:Date.now(),title:n.title,body:n.body,type:n.type,is_read:0,created_at:Math.floor(Date.now()/1000)});
    renderNotifs();updBadges();
    // Rich toast notification - clickable
    showRichToast(n.title,n.body,n.type,n.action_id,n.action_type);
    setTimeout(loadNotifs,600);checkSuspend();
  });
}

  var urls={home:'/',dm:'/inbox',search:'/search',notifs:'/notifications',profile:'/profile'};
  var url=urls[n]||('/'+n);
  if(!noHistory)history.pushState({page:n},''  ,url);
  _curPage=n;
}

function initSwipers(){
  var sX=0,sY=0,cPid=null,cIdx=0,isSw=false;
  document.addEventListener('touchstart',function(e){
    var el=e.target.closest('.pswiper');if(!el)return;
    var pid=el.id.replace('psw-','');
    var inn=document.getElementById('psi-'+pid);
    if(!inn||inn.children.length<2){cPid=null;return;}
    cPid=pid;cIdx=parseInt(el.dataset.idx||'0');
    sX=e.touches[0].clientX;sY=e.touches[0].clientY;isSw=false;
  },{passive:true});
  document.addEventListener('touchmove',function(e){
    if(!cPid)return;
    var dx=Math.abs(e.touches[0].clientX-sX),dy=Math.abs(e.touches[0].clientY-sY);
    if(dx>dy&&dx>8)isSw=true;
  },{passive:true});
  document.addEventListener('touchend',function(e){
    if(!cPid||!isSw)return;
    var dx=e.changedTouches[0].clientX-sX;
    var inn=document.getElementById('psi-'+cPid);if(!inn)return;
    var cnt=inn.children.length;
    if(dx<-30&&cIdx<cnt-1)cIdx++;else if(dx>30&&cIdx>0)cIdx--;
    inn.style.transform='translateX(-'+cIdx*100+'%)';
    document.getElementById('psw-'+cPid).dataset.idx=cIdx;
    var ctr=document.getElementById('pscnt-'+cPid);if(ctr)ctr.textContent=(cIdx+1)+'/'+cnt;
    document.querySelectorAll('[id^="psd-'+cPid+'-"]').forEach(function(d,i){d.classList.toggle('on',i===cIdx);});
    cPid=null;isSw=false;
  },{passive:true});
}
function toggleVid(v){if(v.paused)v.play();else v.pause();}
function toggleMute(pid,idx,btn){
  var key=pid+'-'+idx,vid=document.getElementById('pvid-'+pid+'-'+idx);
  _muteState[key]=!_muteState[key];if(vid)vid.muted=!_muteState[key];
  btn.innerHTML=_muteState[key]?'&#128263;':'&#128266;';
}
function togglePostMusic(pid,url,start,end){
  Object.keys(_postAudios).forEach(function(k){
    if(parseInt(k)!==pid){_postAudios[k].pause();clearInterval(_postAudios[k]._iv);
      var b=document.querySelector('#pmus-'+k+' .pmb');if(b)b.innerHTML='&#9654;';}
  });
  var a=_postAudios[pid];
  if(a&&!a.paused){a.pause();clearInterval(a._iv);document.querySelector('#pmus-'+pid+' .pmb').innerHTML='&#9654;';return;}
  if(!a){a=new Audio(url);_postAudios[pid]=a;a._s=start||0;a._e=end||null;}
  a.currentTime=a._s;a.play();
  document.querySelector('#pmus-'+pid+' .pmb').innerHTML='&#9646;&#9646;';
  var dur=a._e?(a._e-a._s):30;
  a._iv=setInterval(function(){
    var el=Math.max(0,a.currentTime-a._s);
    var pr=document.getElementById('pmpr-'+pid);if(pr)pr.style.width=Math.min(100,el/dur*100)+'%';
    var tm=document.getElementById('pmt-'+pid);if(tm)tm.textContent=fmtSec(Math.max(0,dur-el));
    if((a._e&&a.currentTime>=a._e)||a.ended){a.pause();clearInterval(a._iv);var b=document.querySelector('#pmus-'+pid+' .pmb');if(b)b.innerHTML='&#9654;';}
  },200);
}
function likePost(id,btn){
  api('/api/posts/'+id+'/like','POST').then(function(r){
    var svg=btn.querySelector('svg');
    if(svg){svg.setAttribute('fill',r.liked?'var(--rd)':'none');svg.setAttribute('stroke',r.liked?'var(--rd)':'currentColor');}
    btn.className='ta-btn'+(r.liked?' liked':'');
    var lk=document.getElementById('tlk-'+id);
    if(lk)lk.textContent=r.likes;
  }).catch(function(e){toast(e.message,'red');});
}
function delPost(id){
  if(!confirm('Delete post?'))return;
  api('/api/posts/'+id,'DELETE').then(function(){
    allPosts=allPosts.filter(function(p){return p.id!==id;});
    var el=document.getElementById('pc-'+id);if(el)el.remove();toast('Deleted');
  }).catch(function(e){toast(e.message,'red');});
}

// NEW POST
function openNewPost(){
  if(!me.verified){toast('Only verified users can post','red');return;}
  var inp=document.createElement('input');inp.type='file';inp.accept='image/*,video/*';inp.multiple=true;
  inp.onchange=function(e){if(e.target.files.length)startPostFlow(Array.from(e.target.files));};
  inp.click();
}
function startPostFlow(files){
  _pf=files;_pmf=null;_pms=0;_pme=null;_pmd=0;
  var prev='';
  files.slice(0,10).forEach(function(f){
    var url=URL.createObjectURL(f),isV=f.type.startsWith('video');
    prev+='<div style="width:80px;height:80px;border-radius:8px;overflow:hidden;flex-shrink:0">'+(isV?'<video src="'+url+'" muted style="width:100%;height:100%;object-fit:cover">':'<img src="'+url+'" style="width:100%;height:100%;object-fit:cover"/>')+'</div>';
  });
  showCenter('<div class="mttl">New Post</div><div class="mfrm">'+
    '<div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:10px">'+prev+'</div>'+
    '<div style="font-size:12px;color:var(--tx3);margin-bottom:10px">'+files.length+' file'+(files.length>1?'s':'')+' selected</div>'+
    '<label class="ml">Caption</label><textarea class="mi" id="pcap" maxlength="200" placeholder="Write a caption..."></textarea>'+
    buildMusicUI('post')+
    '<button class="mbtn mb" id="psbtn" onclick="submitPost()">Share</button>'+
    '<button class="mbtn mg" onclick="closeOv(\'ov-center\');stopTA(\'p\')">Cancel</button></div>');
}
function buildMusicUI(pfx){
  return '<div class="mpick" id="'+pfx+'-mpick" onclick="pickMusic(\''+pfx+'\')">Add Music (.mp3) - max 30 sec</div>'+
    '<div class="trwrap" id="'+pfx+'-trwrap">'+
    '<div class="trttl"><span id="'+pfx+'-trsong">Trim Audio</span>'+
    '<button onclick="removeMusic(\''+pfx+'\')" style="background:none;color:var(--rd);font-size:12px;cursor:pointer;border:none">Remove</button></div>'+
    '<div class="trwave"><div class="trbars" id="'+pfx+'-trbars"></div><div class="trfill" id="'+pfx+'-trfill"></div></div>'+
    '<div style="display:flex;gap:8px">'+
    '<div style="flex:1"><div style="font-size:10px;color:var(--tx3);margin-bottom:2px">Start</div>'+
    '<input type="range" class="trsl" id="'+pfx+'-trs" min="0" max="100" value="0" step="0.1" oninput="onTrim(\''+pfx+'\')"/></div>'+
    '<div style="flex:1"><div style="font-size:10px;color:var(--tx3);margin-bottom:2px">End</div>'+
    '<input type="range" class="trsl" id="'+pfx+'-tre" min="0" max="100" value="100" step="0.1" oninput="onTrim(\''+pfx+'\')"/></div></div>'+
    '<div class="trtime"><span id="'+pfx+'-trt0">0:00</span><span id="'+pfx+'-trdur">0:00 sel</span><span id="'+pfx+'-trt1">0:00</span></div>'+
    '<div class="trpbtns">'+
    '<button class="trpbtn" id="'+pfx+'-trpbtn" onclick="previewTrim(\''+pfx+'\')">&#9654; Preview</button>'+
    '<button class="trpbtn" onclick="stopTA(\''+pfx[0]+'\')">&#9646;&#9646; Stop</button></div></div>';
}
function pickMusic(pfx){
  var inp=document.createElement('input');inp.type='file';inp.accept='.mp3,audio/*';
  inp.onchange=function(e){
    var f=e.target.files[0];if(!f)return;
    if(pfx==='post')_pmf=f;else _nmf=f;
    var aud=new Audio(URL.createObjectURL(f));
    aud.onloadedmetadata=function(){
      var dur=Math.min(aud.duration,300);
      if(pfx==='post'){_pmd=dur;_pms=0;_pme=Math.min(dur,30);}
      else{_nmd=dur;_nms=0;_nme=Math.min(dur,30);}
      document.getElementById(pfx+'-trwrap').style.display='block';
      var mp=document.getElementById(pfx+'-mpick');
      if(mp){mp.className='mpick has';mp.textContent=f.name.slice(0,28);}
      var ts=document.getElementById(pfx+'-trsong');if(ts)ts.textContent=f.name.slice(0,26);
      var tre=document.getElementById(pfx+'-tre');
      if(tre)tre.value=(Math.min(dur,30)/dur*100);
      drawBars(pfx+'-trbars');onTrim(pfx);
    };
  };inp.click();
}
function drawBars(id){
  var b=document.getElementById(id);if(!b)return;
  var h='';for(var i=0;i<60;i++)h+='<div class="trbar" style="height:'+Math.max(20,Math.random()*80+20)+'%"></div>';
  b.innerHTML=h;
}
function onTrim(pfx){
  var isP=pfx==='post',dur=isP?_pmd:_nmd;if(!dur)return;
  var sv=parseFloat((document.getElementById(pfx+'-trs')||{}).value||0);
  var ev=parseFloat((document.getElementById(pfx+'-tre')||{}).value||100);
  var s=sv/100*dur,e=ev/100*dur;
  if(e-s>30){var tre=document.getElementById(pfx+'-tre');if(tre)tre.value=Math.min(100,(s+30)/dur*100);return onTrim(pfx);}
  if(s>=e-0.5){var trs=document.getElementById(pfx+'-trs');if(trs)trs.value=Math.max(0,(e-1)/dur*100);return onTrim(pfx);}
  if(isP){_pms=s;_pme=e;}else{_nms=s;_nme=e;}
  var t0=document.getElementById(pfx+'-trt0');if(t0)t0.textContent=fmtSec(s);
  var t1=document.getElementById(pfx+'-trt1');if(t1)t1.textContent=fmtSec(e);
  var td=document.getElementById(pfx+'-trdur');if(td)td.textContent=fmtSec(e-s)+' sel';
  var fill=document.getElementById(pfx+'-trfill');if(fill){fill.style.left=sv+'%';fill.style.width=(ev-sv)+'%';}
}
function previewTrim(pfx){
  stopTA(pfx[0]);
  var mf=pfx==='post'?_pmf:_nmf;if(!mf)return;
  var s=pfx==='post'?_pms:_nms,e=pfx==='post'?_pme:_nme;
  var a=new Audio(URL.createObjectURL(mf));a.currentTime=s;a.play();
  if(pfx==='post')_pta=a;else _nta=a;
  var btn=document.getElementById(pfx+'-trpbtn');if(btn)btn.classList.add('pl');
  var iv=setInterval(function(){
    if(!a||a.paused||(e&&a.currentTime>=e)){a.pause();clearInterval(iv);var b=document.getElementById(pfx+'-trpbtn');if(b)b.classList.remove('pl');}
  },100);
  if(pfx==='post')_pti=iv;else _nti=iv;
}
function stopTA(p){
  if(p==='p'){clearInterval(_pti);if(_pta){_pta.pause();_pta=null;}var b=document.getElementById('post-trpbtn');if(b)b.classList.remove('pl');}
  else{clearInterval(_nti);if(_nta){_nta.pause();_nta=null;}var b2=document.getElementById('note-trpbtn');if(b2)b2.classList.remove('pl');}
}
function removeMusic(pfx){
  stopTA(pfx[0]);
  if(pfx==='post'){_pmf=null;_pms=0;_pme=null;}else{_nmf=null;_nms=0;_nme=null;}
  document.getElementById(pfx+'-trwrap').style.display='none';
  var mp=document.getElementById(pfx+'-mpick');
  if(mp){mp.className='mpick';mp.textContent='Add Music (.mp3) - max 30 sec';}
}
function submitPost(){
  if(!_pf||!_pf.length)return;stopTA('p');
  var cap=(document.getElementById('pcap')||{}).value||'';
  var btn=document.getElementById('psbtn');if(btn){btn.disabled=true;btn.textContent='Sharing...';}
  var fd=new FormData();
  _pf.forEach(function(f){fd.append('photos',f);});
  fd.append('caption',cap.trim());
  if(_pmf){fd.append('music',_pmf);fd.append('music_start',_pms||0);fd.append('music_end',_pme||Math.min(_pmd,30));fd.append('music_name',_pmf.name.replace(/\.mp3$/i,'').slice(0,50));}
  fetch(API+'/api/posts',{method:'POST',headers:{Authorization:'Bearer '+token},body:fd})
    .then(function(r){return r.text().then(function(t){var d;try{d=JSON.parse(t);}catch(er){throw new Error('Server error');}if(!r.ok)throw new Error(d.error||'Failed');return d;});})
    .then(function(){_pf=null;_pmf=null;closeOv('ov-center');toast('Posted!');loadHome();})
    .catch(function(e){toast(e.message,'red');if(btn){btn.disabled=false;btn.textContent='Share';}});
}

        '<span class="pmt" id="mna-pmt">'+fmtSec(dur)+'</span></div>';

function toggleMyNoteAudio(){
  var nd=_myNoteAudio;if(!nd)return;
  if(nd.a&&!nd.a.paused){nd.a.pause();clearInterval(nd.iv);document.getElementById('mna-pmb').innerHTML='&#9654;';return;}
  if(!nd.a)nd.a=new Audio(nd.url);nd.a.currentTime=nd.s;nd.a.play();
  document.getElementById('mna-pmb').innerHTML='&#9646;&#9646;';
  nd.iv=setInterval(function(){
    var el=Math.max(0,nd.a.currentTime-nd.s);
    var pr=document.getElementById('mna-pmpr');if(pr)pr.style.width=Math.min(100,el/nd.dur*100)+'%';
    var tm=document.getElementById('mna-pmt');if(tm)tm.textContent=fmtSec(Math.max(0,nd.dur-el));
    if((nd.e&&nd.a.currentTime>=nd.e)||nd.a.ended){nd.a.pause();clearInterval(nd.iv);var b=document.getElementById('mna-pmb');if(b)b.innerHTML='&#9654;';}
  },200);
}
function stopMyNoteAudio(){if(_myNoteAudio&&_myNoteAudio.a){_myNoteAudio.a.pause();clearInterval(_myNoteAudio.iv);}}
function saveNote(){
  var content=(document.getElementById('note-inp')||{}).value;
  if(!content||!content.trim())return toast('Write something','red');
  stopTA('n');
  var fd=new FormData();fd.append('content',content.trim());
  if(_nmf){fd.append('music',_nmf);fd.append('music_start',_nms||0);fd.append('music_end',_nme||Math.min(_nmd,30));fd.append('music_name',_nmf.name.replace(/\.mp3$/i,'').slice(0,50));}
  fetch(API+'/api/notes',{method:'POST',headers:{Authorization:'Bearer '+token},body:fd})
    .then(function(r){return r.text().then(function(t){var d;try{d=JSON.parse(t);}catch(er){throw new Error('Server error');}if(!r.ok)throw new Error(d.error||'Failed');return d;});})
    .then(function(){_nmf=null;closeOv('ov-center');toast('Note shared!');loadHome();})
    .catch(function(e){toast(e.message,'red');});
}
function deleteNote(){
  api('/api/notes','DELETE').then(function(){closeOv('ov-center');toast('Deleted');loadHome();}).catch(function(e){toast(e.message,'red');});
}

// CONVOS / GROUPS
function loadConvos(){api('/api/conversations').then(function(r){allConvos=r;if(dmTab==='dms')renderConvos();}).catch(function(){});}
function loadGroups(){api('/api/groups').then(function(r){allGroups=r;if(dmTab==='grp')renderGroups();}).catch(function(){});}
function switchTab(t){
  dmTab=t;
  document.getElementById('tab-dms').classList.toggle('on',t==='dms');
  document.getElementById('tab-grp').classList.toggle('on',t==='grp');
  if(t==='dms')renderConvos();else renderGroups();
}
function filterList(){if(dmTab==='dms')renderConvos();else renderGroups();}
function renderConvos(){
  var q=(document.getElementById('dmsi')||{}).value||'';q=q.toLowerCase();
  var list=q?allConvos.filter(function(c){return(c.username||'').toLowerCase().indexOf(q)>=0||(c.name||'').toLowerCase().indexOf(q)>=0;}):allConvos;
  var el=document.getElementById('dlist');if(!el)return;
  if(!list.length){
    el.innerHTML='<div style="padding:32px;text-align:center;color:var(--tx3);font-size:13px">No messages yet<br><br>'+
      '<button onclick="goPage(\'search\')" style="background:var(--ac);color:#fff;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;border:none">Find people</button></div>';
    return;
  }
  var isPriv=me.privacy_enabled&&!privUnlocked,html='';
  list.forEach(function(c){
    var dn=c.name||c.username,online=onlineSet.has(parseInt(c.peer_id));
    var prev=c.is_unsent?'Unsent':(c.last_sender_id===me.id?'You: ':'')+(c.msg_type==='photo'?'[photo]':c.last_content||'');
    if(isPriv)prev='[locked]';
    html+='<div class="dmi'+((!activeGroupId&&parseInt(activePeerId)===parseInt(c.peer_id))?' on':'')+'" onclick="openChat('+c.peer_id+')">'+
      '<div style="position:relative">'+avHtml({name:dn,avatar:c.avatar,avatar_color:c.avatar_color,username:c.username},56)+(online?'<div class="od"></div>':'')+'</div>'+
      '<div class="dmii"><div class="dmin">'+esc(dn)+(c.verified?'<span class="vb sm"></span>':'')+'</div>'+
      '<div class="dmip">'+esc(prev.slice(0,44))+'</div></div>'+
      '<span class="dmit">'+fmtTime(c.last_at)+'</span>'+
      '<button class="dmi3" onclick="event.stopPropagation();ctxPeerId='+c.peer_id+';showCtx(event,false)">&#8942;</button></div>';
  });
  el.innerHTML=html;
}
function renderGroups(){
  var q=(document.getElementById('dmsi')||{}).value||'';q=q.toLowerCase();
  var list=q?allGroups.filter(function(g){return(g.name||'').toLowerCase().indexOf(q)>=0;}):allGroups;
  var el=document.getElementById('dlist');if(!el)return;
  if(!list.length){
    el.innerHTML='<div style="padding:32px;text-align:center;color:var(--tx3);font-size:13px">No groups<br><br>'+
      '<button onclick="openCreateGroup()" style="background:var(--ac);color:#fff;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;border:none">Create Group</button></div>';
    return;
  }
  var html='';
  list.forEach(function(g){
    html+='<div class="dmi'+(activeGroupId===parseInt(g.id)?' on':'')+'" onclick="openGroupChat('+g.id+')">'+
      avHtml({avatar:g.avatar,avatar_color:g.avatar_color||'#0095f6',name:g.name,username:g.name},56)+

}

  ]).then(function(res){

// MESSAGES
function renderMsgs(isGrp){
  var c=document.getElementById('msgs');if(!c)return;
  var isPriv=!isGrp&&me.privacy_enabled&&!privUnlocked;
  c.className='msgs'+(isPriv?' pblur':'');
  if(!allMsgs.length){c.innerHTML='<div style="text-align:center;padding:40px;color:var(--tx3);font-size:13px">No messages yet</div>';return;}
  var lastDate='',html='';
  allMsgs.forEach(function(msg){
    var md=new Date(msg.created_at*1000).toDateString();
    if(md!==lastDate){html+='<div class="ddiv">'+fmtDate(msg.created_at)+'</div>';lastDate=md;}
    html+=buildMsg(msg,isPriv,!!isGrp);
  });
  c.innerHTML=html;
}
function buildMsg(msg,isPriv,isGrp){
  var mine=msg.sender_id===me.id;
  if(msg.msg_type==='system')return'<div class="sysmsg">'+esc(msg.content)+'</div>';
  var react='';
  if(msg.reaction){
    var r=null;try{r=typeof msg.reaction==='string'?JSON.parse(msg.reaction):msg.reaction;}catch(er){}
    if(r&&r.emoji)react='<div class="rchip'+(r.user_id===me.id?' me':'')+'" onclick="doReact('+msg.id+',\''+r.emoji+'\')">'+r.emoji+'</div>';
  }
  var rpHTML='';
  if(msg.reply_to){
    var orig=allMsgs.find(function(m){return m.id===msg.reply_to;});
    if(orig)rpHTML='<div class="rprev" onclick="scrollToMsg('+orig.id+')">Reply: '+esc((orig.content||'').slice(0,35))+'</div>';
  }
  var content='';
  if(msg.is_unsent)content='<em style="opacity:.4;font-size:13px">Message deleted</em>';
  else if(msg.msg_type==='game_invite'){
    var gd={};try{gd=JSON.parse(msg.content||'{}');}catch(er){}
    var gname=gd.game==='ttt'?'Tic Tac Toe':'Game';
    var isPending=gd.status==='pending',isAccepted=gd.status==='accepted',isDeclined=gd.status==='declined';
    content='<div style="background:linear-gradient(135deg,#0d0d20,#0a0a1a);border:1px solid #2a2a4a;border-radius:14px;padding:14px 16px;min-width:180px">'+
      '<div style="font-size:18px;margin-bottom:6px">&#127918;</div>'+
      '<div style="font-size:14px;font-weight:800;margin-bottom:3px">'+gname+' Invite</div>'+
      '<div style="font-size:12px;color:var(--tx3);margin-bottom:10px">'+esc((msg.sender_display||'Someone'))+' wants to play!</div>'+
      (isPending&&!mine?'<div style="display:flex;gap:8px">'+
        '<button onclick="respondGameInvite('+msg.id+',true)" style="flex:1;background:var(--ac);color:#fff;border:none;border-radius:8px;padding:8px;font-size:12px;font-weight:700;cursor:pointer">Join</button>'+
        '<button onclick="respondGameInvite('+msg.id+',false)" style="flex:1;background:var(--bg3);color:var(--tx2);border:1px solid var(--bd2);border-radius:8px;padding:8px;font-size:12px;font-weight:700;cursor:pointer">Decline</button></div>':
        (isAccepted?'<div style="color:var(--gn);font-size:12px;font-weight:700">&#10003; Accepted!</div>':
        (isDeclined?'<div style="color:var(--rd);font-size:12px;font-weight:700">Declined</div>':
        '<div style="color:var(--tx3);font-size:12px">Invite sent</div>')))+
      '</div>';
  }else if(msg.msg_type==='photo')content=isPriv?'<div style="width:80px;height:60px;background:var(--bg4);border-radius:8px;display:flex;align-items:center;justify-content:center">&#128274;</div>':'<img src="'+msg.content+'" onclick="openLB(\''+msg.content+'\')" style="max-width:200px;border-radius:12px;cursor:zoom-in" loading="lazy"/>';
  else content=esc(isPriv?rot13(msg.content):msg.content).replace(/\n/g,'<br>');
  var canAct=mine&&!msg.is_unsent&&!isPriv;
  var canDel=isGrp?(msg.sender_id===me.id||['admin','mod'].indexOf(activePeer&&activePeer.my_role)>=0):mine;
  var senderLbl=isGrp&&!mine?'<div style="font-size:11px;color:var(--tx3);margin-bottom:2px;font-weight:600">'+esc(msg.sender_display||msg.sender_name||'')+'</div>':'';
  var avEl=(!mine&&isGrp)?avHtml({avatar:msg.sender_avatar,avatar_color:msg.sender_color||'#555',name:msg.sender_display||msg.sender_name||'?',username:'?'},28):'';
  var acts='<div class="macts">';
  if(!isPriv)acts+='<button class="mact" onclick="toggleRP('+msg.id+')">react</button><button class="mact" onclick="startReply('+msg.id+')">reply</button>';
  if(canAct)acts+='<button class="mact" onclick="startEdit('+msg.id+',\''+escA(msg.content)+'\')">edit</button><button class="mact rd" onclick="doUnsend('+msg.id+')">unsend</button>';
  if(canDel&&!isPriv)acts+='<button class="mact rd" onclick="'+(isGrp?'delGrpMsg('+msg.id+')':'doDel('+msg.id+')')+'">del</button>';
  acts+='</div>';
  var ticks=mine&&!isGrp&&!msg.is_unsent?(msg.is_seen?'<span class="stk">&#10003;&#10003;</span>':'<span class="stk s">&#10003;</span>'):'';
  return'<div class="mrow '+(mine?'mine':'theirs')+' min" id="mr-'+msg.id+'">'+avEl+
    '<div class="mwrap">'+senderLbl+
    '<div class="bub'+(msg.is_unsent?' uns':'')+'" id="mb-'+msg.id+'" style="position:relative">'+
    '<div class="rpick" id="rp-'+msg.id+'" style="display:none">'+
    ['&#10084;','&#128514;','&#128558;','&#128546;','&#128545;','&#128077;','&#128293;','&#128525;'].map(function(em,i){
      var emojis=['\u2764','\ud83d\ude02','\ud83d\ude2e','\ud83d\ude22','\ud83d\ude21','\ud83d\udc4d','\ud83d\udd25','\ud83d\ude0d'];
      return'<span class="rbtn" onclick="doReact('+msg.id+',\''+emojis[i]+'\');closeRP('+msg.id+')">'+em+'</span>';
    }).join('')+
    '</div>'+rpHTML+content+(msg.is_edited&&!msg.is_unsent?'<span class="etag">edited</span>':'')+'</div>'+
    react+acts+'<div class="mtm" style="text-align:'+(mine?'right':'left')+'">'+fmtTime(msg.created_at)+ticks+'</div></div></div>';
}
function appendMsg(msg,isGrp){
  var c=document.getElementById('msgs');if(!c)return;
  if(msg.msg_type==='system'){var d=document.createElement('div');d.className='sysmsg';d.textContent=msg.content;c.appendChild(d);return;}
  var isPriv=!isGrp&&me.privacy_enabled&&!privUnlocked;
  var t=document.createElement('template');t.innerHTML=buildMsg(msg,isPriv,!!isGrp);
  if(t.content.firstChild)c.appendChild(t.content.firstChild);
}
function scrollBtm(){var c=document.getElementById('msgs');if(c)requestAnimationFrame(function(){c.scrollTop=c.scrollHeight;});}
function scrollToMsg(id){var el=document.getElementById('mr-'+id);if(el)el.scrollIntoView({behavior:'smooth',block:'center'});}
function rot13(t){return t.split('').map(function(c){var n=c.charCodeAt(0);if(n>=65&&n<=90)return String.fromCharCode(((n-65+13)%26)+65);if(n>=97&&n<=122)return String.fromCharCode(((n-97+13)%26)+97);return c;}).join('');}
function toggleRP(id){
  var el=document.getElementById('rp-'+id);if(!el)return;
  var vis=el.style.display==='flex';
  document.querySelectorAll('.rpick').forEach(function(p){p.style.display='none';});
  if(!vis){el.style.display='flex';setTimeout(function(){document.addEventListener('click',function f(){closeRP(id);document.removeEventListener('click',f,true);},{once:true,capture:true});},50);}
}
function closeRP(id){var el=document.getElementById('rp-'+id);if(el)el.style.display='none';}
function doReact(msgId,emoji){
  if(activeGroupId)return;
  api('/api/messages/'+msgId+'/react','POST',{emoji:emoji}).catch(function(e){toast(e.message,'red');});
}
function delGrpMsg(mid){if(!confirm('Delete?'))return;api('/api/groups/'+activeGroupId+'/messages/'+mid,'DELETE').catch(function(e){toast(e.message,'red');});}

// INPUT
function setupInput(){
  var inp=document.getElementById('msg-inp');
  inp.addEventListener('input',function(){
    inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,120)+'px';
    if(activeGroupId)socket.emit('group_typing',{sender_id:me.id,group_id:activeGroupId,typing:true});
    else{socket.emit('typing',{sender_id:me.id,receiver_id:activePeerId,typing:true});
      clearTimeout(typT);typT=setTimeout(function(){socket.emit('typing',{sender_id:me.id,receiver_id:activePeerId,typing:false});},1500);}
  });
  inp.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();}});
  document.getElementById('ph-inp').addEventListener('change',function(e){
    var file=e.target.files[0];if(!file)return;
    if(file.size>8*1024*1024){toast('Max 8MB','red');return;}
    var fd=new FormData();fd.append('photo',file);
    fetch(API+'/api/messages/upload',{method:'POST',headers:{Authorization:'Bearer '+token},body:fd})
      .then(function(r){return r.json();})
      .then(function(d){
        if(d.error)return toast(d.error,'red');
        socket.emit('send_message',{token:token,receiver_id:activePeerId,content:d.url,msg_type:'photo'},function(res){
          if(res&&res.error)toast(res.error,'red');
          else if(res&&res.message){allMsgs.push(res.message);appendMsg(res.message,false);scrollBtm();loadConvos();}
        });
      }).catch(function(e){toast(e.message,'red');});
    e.target.value='';
  });
  document.addEventListener('click',function(e){
    if(!e.target.closest('.ctx')&&!e.target.closest('[onclick*="showCtx"]')&&!e.target.closest('[onclick*="openChatCtx"]'))closeCtx();
  });
}
function trigPhoto(){if(activeGroupId){toast('Photos only in DMs','red');return;}document.getElementById('ph-inp').click();}
function doSend(){
  var inp=document.getElementById('msg-inp'),content=inp.value.trim();
  if(!content||(!activePeerId&&!activeGroupId))return;
  if(editId&&!activeGroupId){doEditInline(content);return;}
  inp.value='';inp.style.height='auto';
  if(activeGroupId){
    socket.emit('send_group_message',{token:token,group_id:activeGroupId,content:content,msg_type:'text',reply_to:replyId||null},function(res){
      if(res&&res.error)toast(res.error,'red');
      else if(res&&res.message){allMsgs.push(res.message);appendMsg(res.message,true);scrollBtm();loadGroups();}
    });
  }else{
    socket.emit('send_message',{token:token,receiver_id:activePeerId,content:content,msg_type:'text',reply_to:replyId||null},function(res){
      if(res&&res.error)toast(res.error,'red');
      else if(res&&res.message){allMsgs.push(res.message);appendMsg(res.message,false);scrollBtm();loadConvos();}
    });
  }
  cancelReply();
}
function startEdit(id,c){editId=id;var inp=document.getElementById('msg-inp');inp.value=c;inp.focus();inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,120)+'px';document.getElementById('ebar').style.display='flex';}
function cancelEdit(){editId=null;document.getElementById('msg-inp').value='';document.getElementById('msg-inp').style.height='auto';document.getElementById('ebar').style.display='none';}
function doEditInline(c){api('/api/messages/'+editId+'/edit','PUT',{content:c}).then(function(){cancelEdit();}).catch(function(e){toast(e.message,'red');});}
function startReply(id){
  replyId=id;var m=allMsgs.find(function(x){return x.id===id;});
  var b=document.getElementById('rbar'),l=document.getElementById('rbt');
  if(b)b.style.display='flex';
  if(l&&m)l.textContent='Reply: '+(m.content||'').slice(0,35);
  document.getElementById('msg-inp').focus();
}
function cancelReply(){replyId=null;var b=document.getElementById('rbar');if(b)b.style.display='none';}
function doUnsend(id){if(!confirm('Unsend?'))return;api('/api/messages/'+id+'/unsend','PUT').catch(function(e){toast(e.message,'red');});}
function doDel(id){
  if(!confirm('Delete permanently?'))return;
  api('/api/messages/'+id,'DELETE').then(function(){allMsgs=allMsgs.filter(function(m){return m.id!==id;});renderMsgs();loadConvos();}).catch(function(e){toast(e.message,'red');});
}

function submitGroup(){

  }).catch(function(e){toast(e.message,'red');});

function showGroupMembers(gid){
  api('/api/groups/'+gid+'/members').then(function(members){
    var isAdmin=activePeer&&['admin','mod'].indexOf(activePeer.my_role)>=0;
    var isOwner=activePeer&&activePeer.creator_id===me.id;
    var html='<div class="mttl">Members ('+members.length+')</div><div style="max-height:55vh;overflow-y:auto">';
    members.forEach(function(m){
      var rL=m.role==='admin'?'Admin':m.role==='mod'?'Mod':'Member';
      var rC=m.role==='admin'?'#f7971e':m.role==='mod'?'var(--ac)':'var(--tx3)';
      var isMe=m.id===me.id;
      html+='<div class="uli">'+avHtml(m,44)+
        '<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;display:flex;align-items:center;gap:3px">'+esc(m.username)+(m.verified?'<span class="vb sm"></span>':'')+'</div>'+
        '<div style="font-size:11px;color:'+rC+'">'+rL+'</div></div>';
      if(isAdmin&&!isMe){
        html+='<button onclick="kickMem('+m.id+')" style="background:#ed495618;border:none;border-radius:6px;color:var(--rd);font-size:10px;padding:3px 7px;cursor:pointer;margin-left:2px">Kick</button>';
        html+='<button onclick="banMem('+m.id+',\''+escA(m.username)+'\')" style="background:#ed495630;border:none;border-radius:6px;color:var(--rd);font-size:10px;padding:3px 7px;cursor:pointer;margin-left:2px">Ban</button>';
        if(isOwner&&m.role!=='admin')html+='<button onclick="setRole('+m.id+',\'admin\')" style="background:#f7971e20;border:none;border-radius:6px;color:#f7971e;font-size:10px;padding:3px 7px;cursor:pointer;margin-left:2px">Admin</button>';
        if(isOwner&&m.role==='member')html+='<button onclick="setRole('+m.id+',\'mod\')" style="background:#0095f620;border:none;border-radius:6px;color:var(--ac);font-size:10px;padding:3px 7px;cursor:pointer;margin-left:2px">Mod</button>';
        if(isOwner&&(m.role==='admin'||m.role==='mod'))html+='<button onclick="setRole('+m.id+',\'member\')" style="background:var(--bg3);border:none;border-radius:6px;color:var(--tx3);font-size:10px;padding:3px 7px;cursor:pointer;margin-left:2px">Demote</button>';
      }
      html+='</div>';
    });
    html+='</div><div style="padding:10px 14px;display:flex;gap:6px;flex-wrap:wrap">';
    if(activePeer&&activePeer.invite_link)html+='<button onclick="copyInvite()" class="mbtn mg" style="margin:0;flex:1;padding:8px;font-size:12px">Copy Invite</button>';
    if(isAdmin)html+='<button onclick="closeOv(\'ov-center\');openGroupBans()" class="mbtn mg" style="margin:0;flex:1;padding:8px;font-size:12px">Banned</button>';
    html+='<button onclick="closeOv(\'ov-center\')" class="mbtn mg" style="margin:0;flex:1;padding:8px;font-size:12px">Close</button></div>';
    showCenter(html);
  }).catch(function(e){toast(e.message,'red');});
}
function copyInvite(){
  if(activePeer&&activePeer.invite_link)
    navigator.clipboard.writeText(location.origin+'/join/'+activePeer.invite_link)
      .then(function(){toast('Link copied!');}).catch(function(){toast(activePeer.invite_link);});
}
function kickMem(uid){if(!confirm('Kick?'))return;api('/api/groups/'+activeGroupId+'/kick/'+uid,'POST').then(function(){toast('Kicked');showGroupMembers(activeGroupId);}).catch(function(e){toast(e.message,'red');});}
function banMem(uid,uname){
  var reason=prompt('Ban @'+uname+'? Reason:');if(reason===null)return;
  api('/api/groups/'+activeGroupId+'/ban/'+uid,'POST',{reason:reason||''}).then(function(){toast('@'+uname+' banned');showGroupMembers(activeGroupId);}).catch(function(e){toast(e.message,'red');});
}
function setRole(uid,role){if(!confirm('Change role?'))return;api('/api/groups/'+activeGroupId+'/role/'+uid,'POST',{role:role}).then(function(){toast('Done');showGroupMembers(activeGroupId);}).catch(function(e){toast(e.message,'red');});}
function openGroupBans(){
  api('/api/groups/'+activeGroupId+'/bans').then(function(bans){
    var html='<div class="mttl">Banned ('+bans.length+')</div><div style="max-height:50vh;overflow-y:auto">';
    if(!bans.length)html+='<div style="padding:32px;text-align:center;color:var(--tx3)">No banned members</div>';
    else bans.forEach(function(b){
      html+='<div class="uli">'+avHtml(b,44)+'<div style="flex:1"><div style="font-size:13px;font-weight:600">@'+esc(b.username)+'</div>'+
        (b.reason?'<div style="font-size:11px;color:var(--tx3)">'+esc(b.reason)+'</div>':'')+'</div>'+
        '<button onclick="unban('+b.user_id+',\''+escA(b.username)+'\')" style="background:#1db95418;border:none;border-radius:6px;color:var(--gn);font-size:11px;padding:4px 9px;cursor:pointer">Unban</button></div>';
    });
    html+='</div><div style="padding:10px 14px"><button class="mbtn mg" onclick="closeOv(\'ov-center\')" style="margin:0">Close</button></div>';

}
function unban(uid,uname){api('/api/groups/'+activeGroupId+'/ban/'+uid,'DELETE').then(function(){toast('@'+uname+' unbanned');openGroupBans();}).catch(function(e){toast(e.message,'red');});}
function openGroupSettings(){

  showCenter('<div class="mttl">Group Settings</div><div class="mfrm">'+
    '<label class="ml">Group Name</label><input class="mi" id="gsn" value="'+escQ(activePeer.name||'')+'" maxlength="50"/>'+
    '<label class="ml">Description</label><input class="mi" id="gsd" value="'+escQ(activePeer.description||'')+'" maxlength="200"/>'+

    '<div style="font-size:11px;color:var(--tx3);margin-bottom:12px">Use {name} or {username}</div>'+

function saveGroupSettings(){
  var name=fv('gsn'),desc=fv('gsd'),is_public=(document.getElementById('gspub')||{}).checked,welcome=(document.getElementById('gswm')||{}).value||'';
  if(!name)return toast('Name required','red');
  Promise.all([
    api('/api/groups/'+activeGroupId,'PUT',{name:name,description:desc,is_public:is_public}),
    api('/api/groups/'+activeGroupId+'/welcome','PUT',{message:welcome})
  ]).then(function(){
    if(activePeer){activePeer.welcome_message=welcome;activePeer.name=name;}
    closeOv('ov-center');toast('Saved!');openGroupChat(activeGroupId);
  }).catch(function(e){toast(e.message,'red');});
}
function deleteGroup(){
  if(!confirm('Delete group?'))return;
  api('/api/groups/'+activeGroupId,'DELETE').then(function(){closeOv('ov-center');backChat();loadGroups();toast('Group deleted');}).catch(function(e){toast(e.message,'red');});
}

// SEARCH
function setupSearch(){
  var inp=document.getElementById('sinp'),t;
  inp.addEventListener('input',function(){
    clearTimeout(t);var q=inp.value.trim();
    if(!q){document.getElementById('sres').innerHTML='<div style="padding:40px;text-align:center;color:var(--tx3)">Search for people</div>';return;}
    t=setTimeout(function(){
      api('/api/search?q='+encodeURIComponent(q)).then(function(users){
        if(!users.length){document.getElementById('sres').innerHTML='<div style="padding:40px;text-align:center;color:var(--tx3)">No results</div>';return;}
        var html='';
        users.forEach(function(u){
          var online=onlineSet.has(parseInt(u.id));
          html+='<div class="sui" onclick="openPeerProf('+u.id+')">'+
            '<div style="position:relative">'+avHtml(u,44)+(online?'<div class="od"></div>':'')+'</div>'+
            '<div style="flex:1;min-width:0;margin-left:12px">'+
            '<div style="font-size:14px;font-weight:600;display:flex;align-items:center;gap:3px">'+esc(u.username)+(u.verified?'<span class="vb sm"></span>':'')+'</div>'+
            '<div style="font-size:13px;color:var(--tx3)">'+esc(u.name||'')+'</div></div>'+
            '<button onclick="event.stopPropagation();goPage(\'dm\');openChat('+u.id+')" style="background:var(--ac);color:#fff;border-radius:8px;font-size:12px;font-weight:600;padding:5px 13px;cursor:pointer;flex-shrink:0;border:none">Message</button></div>';
        });
        document.getElementById('sres').innerHTML=html;
      }).catch(function(){});
    },300);
  });
}

// NOTIFICATIONS
function loadNotifs(){api('/api/notifications').then(function(r){allNotifs=r;renderNotifs();updBadges();}).catch(function(){});}
function renderNotifs(){
  var el=document.getElementById('nlist');if(!el)return;
  if(!allNotifs.length){el.innerHTML='<div style="padding:40px;text-align:center;color:var(--tx3)">No notifications</div>';return;}
  var icons={info:'i',warning:'!',success:'ok',broadcast:'#'};
  var html='';
  allNotifs.forEach(function(n){
    html+='<div class="ni2'+(n.is_read?'':' unr')+'" onclick="readNotif('+n.id+')">'+
      '<div class="ni2i">'+(icons[n.type]||'!')+'</div>'+
      '<div class="ni2b"><div class="ni2t">'+esc(n.title)+'</div><div class="ni2x">'+esc(n.body)+'</div><div class="ni2m">'+timeAgo(n.created_at)+'</div></div>'+
      (n.is_read?'':'<div class="ni2d"></div>')+'</div>';
  });
  el.innerHTML=html;
}
function updBadges(){
  var u=allNotifs.filter(function(n){return!n.is_read;}).length;
  var b=document.getElementById('notif-badge'),bd=document.getElementById('bn-dot');
  if(b){b.style.display=u?'flex':'none';b.textContent=u||'';}
  if(bd)bd.style.display=u?'block':'none';
}
function readNotif(id){
  api('/api/notifications/'+id+'/read','PUT').then(function(){var n=allNotifs.find(function(x){return x.id===id;});if(n)n.is_read=1;renderNotifs();updBadges();}).catch(function(){});
}
function markAllRead(){api('/api/notifications/read-all','PUT').then(function(){allNotifs.forEach(function(n){n.is_read=1;});renderNotifs();updBadges();}).catch(function(){});}

function openAvatarMenu(){var inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.onchange=function(e){uploadAvatar(e.target.files[0]);};inp.click();}
function uploadAvatar(file){
  if(!file)return;if(file.size>5*1024*1024){toast('Max 5MB','red');return;}
  var fd=new FormData();fd.append('avatar',file);
  fetch(API+'/api/me/avatar',{method:'POST',headers:{Authorization:'Bearer '+token},body:fd})
    .then(function(r){return r.json();})
    .then(function(d){if(d.error)return toast(d.error,'red');me.avatar=d.avatar;localStorage.setItem('cc3_me',JSON.stringify(me));toast('Photo updated!');renderMyProfile();updNav();})
    .catch(function(e){toast(e.message,'red');});
}

function saveProfile(){
  var name=fv('epn'),bio=(document.getElementById('epb')||{}).value||'',username=fv('epu'),
      phone=fv('epph'),gmail=fv('epgm'),is_private=(document.getElementById('eppriv')||{}).checked;

// PEER PROFILE
function openPeerProf(pid){
  if(!pid)return;if(parseInt(pid)===parseInt(me.id)){goPage('profile');return;}
  Promise.all([
    api('/api/user/'+pid),
    api('/api/follow-status/'+pid).catch(function(){return{following:false,requested:false,followers:0,following_count:0,follows_me:false};}),
    api('/api/posts/user/'+pid)
  ]).then(function(res){
    var p=res[0],fs=res[1],posts=res[2],dn=p.name||p.username;
    var online=onlineSet.has(parseInt(p.id));
    var fbtn='';
    if(fs.following)fbtn='<button class="pflb following" onclick="doFollow('+p.id+',this)">Following</button>';
    else if(fs.requested)fbtn='<button class="pflb requested" onclick="doFollow('+p.id+',this)">Requested</button>';
    else if(fs.follows_me)fbtn='<button class="pflb followback" onclick="doFollow('+p.id+',this)">Follow Back</button>';
    else fbtn='<button class="pflb" onclick="doFollow('+p.id+',this)">Follow</button>';
    var canSee=!p.is_private||fs.following;
    var postsHTML='';
    if(!canSee)postsHTML='<div style="padding:40px;text-align:center;color:var(--tx3)">Private account.</div>';
    else if(!posts.length)postsHTML='<div style="padding:40px;text-align:center;color:var(--tx3)">No posts yet</div>';
    else{
      postsHTML='<div class="pgrid">';
      posts.forEach(function(pp){

// PIN HELPERS
function setupPins(){
  document.querySelectorAll('.pinrow').forEach(function(pr){
    var ins=pr.querySelectorAll('.pind');
    ins.forEach(function(inp,i){
      if(inp._set)return;inp._set=true;
      inp.addEventListener('input',function(){inp.value=inp.value.replace(/\D/,'');if(inp.value&&i<ins.length-1)ins[i+1].focus();});
      inp.addEventListener('keydown',function(e){if(e.key==='Backspace'&&!inp.value&&i>0)ins[i-1].focus();if(e.key==='Enter'&&pr.id==='pin-unlock')doUnlock();});
    });
  });
}
function clearPins(id){var el=document.getElementById(id);if(el)el.querySelectorAll('.pind').forEach(function(i){i.value='';});}
function getPin(id){var el=document.getElementById(id);if(!el)return'';return Array.from(el.querySelectorAll('.pind')).map(function(i){return i.value;}).join('');}

function showRichToast(title,body,type,actionId,actionType){
  var el=document.getElementById('toast');
  var icon=type==='info'?'&#128276;':type==='success'?'&#9989;':type==='warning'?'&#9888;':'&#128276;';
  el.innerHTML='<div style="display:flex;align-items:center;gap:10px;max-width:280px">'+
    '<div style="font-size:22px;flex-shrink:0">'+icon+'</div>'+
    '<div style="min-width:0"><div style="font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(title)+'</div>'+
    '<div style="font-size:12px;color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(body||'')+'</div></div></div>';
  el.style.cursor=actionId?'pointer':'default';
  el.onclick=actionId?function(){
    el.classList.remove('on');
    if(actionType==='chat')openChat(actionId);
    else if(actionType==='group')openGroupChat(actionId);
    else goPage('notifs');
  }:function(){el.classList.remove('on');};
  if(type==='red'){el.style.background='rgba(237,73,86,.15)';el.style.color='var(--rd)';el.style.borderColor='rgba(237,73,86,.3)';}
  else if(type==='success'){el.style.background='rgba(35,209,96,.15)';el.style.color='var(--gn)';el.style.borderColor='rgba(35,209,96,.3)';}
  else{el.style.background='rgba(30,30,30,.96)';el.style.color='var(--tx)';el.style.borderColor='var(--bd2)';}
  el.classList.add('on');clearTimeout(_toastT);
  _toastT=setTimeout(function(){el.classList.remove('on');el.onclick=null;},5000);
}
init();

</script>
</body>
</html>
